<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Resume</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            background-color: #f5f5f5;
            border: 1px solid darkgray;
            border-radius: 10px;
            border-top: 5px solid #007BFF;
            flex-direction: column;
        }

        #loader {
            font-size: 20px;
            color: #007BFF;
        }

        img {
            width: 38%;
            max-width: 540px;
            height: auto;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: none; /* Hidden initially */
        }

        @media (max-width: 768px) {
            img {
                width: 95%;
            }
        }
    </style>
</head>
<body>

    <div id="loader">Loading Resume...</div>

    <img id="resumeImage" src="r-index.png" alt="Resume Image">

    <script>
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('resumeImage').style.display = 'block';
        }, 3000); // 3 seconds
    </script>

</body>
</html>
